name: Tests

on:
  push:
    branches:
      - main
      - "*.x"
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [9, 10, 11, 12, 13]
        exclude:
          # Laravel 9 requires PHP 8.0-8.2 only
          - php: 8.3
            laravel: 9
          - php: 8.4
            laravel: 9
          # Laravel 10 requires PHP 8.1-8.3 only
          - php: 8.4
            laravel: 10
          # Laravel 13 requires PHP 8.3+
          - php: 8.2
            laravel: 13

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Clear caches
        run: |
          rm -rf .phpunit.cache
        continue-on-error: true

      - name: Check Pest installation
        run: ls -la vendor/bin/ && cat vendor/bin/pest

      - name: Execute tests
        run: cd $GITHUB_WORKSPACE && vendor/bin/pest tests

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Disable Composer security advisory blocking for EOL Laravel versions
        if: matrix.laravel == 9 || matrix.laravel == 10
        run: |
          php -r '
            $home = getenv("COMPOSER_HOME") ?: (getenv("HOME") . "/.composer");
            @mkdir($home, 0755, true);
            $f = $home . "/composer.json";
            $c = file_exists($f) ? json_decode(file_get_contents($f), true) : [];
            if (!isset($c["config"])) $c["config"] = [];
            if (!isset($c["config"]["audit"])) $c["config"]["audit"] = [];
            $c["config"]["audit"]["block-insecure"] = false;
            file_put_contents($f, json_encode($c, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
            echo "Updated: " . $f . "\n";
          '

      - name: Run MCP integration tests
        env:
          LARAVEL_VERSION: ${{ matrix.laravel }}
        run: |
          ./scripts/test-setup.sh
          cd laravel-mcp-test
          ./run-test.sh
